<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>教えて小村君（商圏情報）</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F0F4FA;
  --surface:#E8EDF5;
  --card:#FFFFFF;
  --card2:#F8FAFD;
  --border:#D0DAE8;
  --border-mid:#B0C0D8;
  --teal:#00A8C0;
  --teal-bright:#00C4DC;
  --teal-dim:#E0F7FB;
  --orange:#F07030;
  --orange-dim:#FEF0E8;
  --navy:#1B2B5E;
  --navy-mid:#2D4A8C;
  --gold:#B8902A;
  --text:#1B2B5E;
  --text-mid:#4A6080;
  --text-light:#7A90A8;
  --red:#D94040;
  --green:#1A9E5A;
  --blue:#2878C0;
  --shadow:0 2px 12px rgba(27,43,94,0.08);
  --shadow-lg:0 8px 32px rgba(27,43,94,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--navy);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.header-logo{display:flex;align-items:center;gap:10px}
.header-logo .mark{width:28px;height:28px;background:var(--teal-bright);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:var(--navy)}
.header-logo .title{color:#fff;font-size:16px;font-weight:700;letter-spacing:0.02em}
.header-logo .subtitle{color:rgba(255,255,255,0.5);font-size:11px;margin-left:6px}
.header-badge{background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;letter-spacing:0.05em}
.selector-bar{background:var(--navy);padding:10px 24px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,0.08)}
.selector-bar label{color:rgba(255,255,255,0.6);font-size:11px;font-weight:500;margin-right:2px}
.selector-bar select{background:#fff;border:1.5px solid var(--border-mid);border-radius:6px;padding:6px 10px;font-size:13px;color:var(--text);font-family:'Noto Sans JP',sans-serif;cursor:pointer;min-width:120px}
.selector-bar select:focus{outline:none;border-color:var(--teal-bright)}
.btn-refresh{background:var(--orange);color:#fff;border:none;border-radius:6px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;letter-spacing:0.05em}
.btn-refresh:hover{background:#d95f20}
.tabs{background:var(--card);border-bottom:2px solid var(--border);padding:0 24px;display:flex;gap:0;overflow-x:auto;box-shadow:var(--shadow)}
.tab{padding:14px 18px;font-size:13px;font-weight:600;color:var(--text-mid);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s;margin-bottom:-2px}
.tab:hover{color:var(--teal)}
.tab.active{color:var(--teal);border-bottom-color:var(--teal-bright)}
.content{padding:24px;max-width:1400px;margin:0 auto}
.panel{display:none}
.panel.active{display:block}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:10px;padding:16px;box-shadow:var(--shadow);border:1px solid var(--border)}
.kpi-label{font-size:11px;color:var(--text-light);font-weight:500;margin-bottom:6px;letter-spacing:0.04em}
.kpi-value{font-size:26px;font-weight:900;color:var(--navy);font-family:'DM Mono',monospace;line-height:1}
.kpi-unit{font-size:12px;color:var(--text-mid);margin-left:3px;font-family:'Noto Sans JP',sans-serif}
.kpi-sub{font-size:11px;color:var(--text-light);margin-top:4px}
.kpi-up{color:var(--green)}
.kpi-down{color:var(--red)}
.kpi.highlight{border-top:3px solid var(--teal-bright)}
.kpi.highlight-orange{border-top:3px solid var(--orange)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}
.card{background:var(--card);border-radius:10px;padding:20px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:6px}
.card-title .dot{width:8px;height:8px;border-radius:50%;background:var(--teal-bright)}
.card-title .dot-o{background:var(--orange)}
.chart-wrap{position:relative;height:220px}
.chart-wrap-tall{position:relative;height:300px}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:var(--surface);color:var(--text-mid);font-weight:600;padding:8px 10px;text-align:left;border-bottom:2px solid var(--border)}
.data-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text)}
.data-table tr:hover td{background:var(--card2)}
.data-table .num{font-family:'DM Mono',monospace;text-align:right}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;background:var(--surface);color:var(--text-mid)}
.rank-badge.r1{background:#F0D060;color:#7A5800}
.rank-badge.r2{background:#D8D8E8;color:#4A4A6A}
.rank-badge.r3{background:#E8C0A0;color:#7A3A18}
.trend-spark{display:flex;align-items:flex-end;gap:2px;height:24px}
.spark-bar{width:6px;border-radius:2px 2px 0 0;background:var(--teal-bright);opacity:0.7}
.spark-bar.last{opacity:1;background:var(--navy)}
.rank-up{color:var(--green);font-size:11px;font-weight:700}
.rank-down{color:var(--red);font-size:11px;font-weight:700}
.rank-same{color:var(--text-light);font-size:11px}
.section-title{font-size:18px;font-weight:900;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:4px;height:20px;background:var(--teal-bright);border-radius:2px;display:inline-block}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:var(--teal-dim);color:var(--teal)}
.tag-o{background:var(--orange-dim);color:var(--orange)}
.tag-red{background:#FEE8E8;color:var(--red)}
.tag-green{background:#E0F7EC;color:var(--green)}
.score-meter{margin:12px 0}
.score-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-light);margin-bottom:4px}
.score-bar-bg{height:8px;background:var(--surface);border-radius:4px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--teal),var(--teal-bright));transition:width .6s}
.report-section{background:var(--card);border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid var(--border)}
.report-section h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.report-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.report-item:last-child{border-bottom:none}
.report-item .ri-label{min-width:120px;color:var(--text-light);font-size:12px}
.report-item .ri-value{color:var(--text);font-weight:500}
.heatmap-table{width:100%;border-collapse:collapse;font-size:11px}
.heatmap-table th{padding:6px 8px;background:var(--surface);color:var(--text-mid);font-weight:600;border:1px solid var(--border);text-align:center}
.heatmap-table td{padding:6px 8px;border:1px solid var(--border);text-align:center;font-weight:700;font-family:'DM Mono',monospace}
.alert{border-radius:8px;padding:12px 16px;margin-bottom:12px;font-size:13px;display:flex;gap:10px;align-items:flex-start}
.alert-info{background:#EBF7FF;border-left:4px solid var(--teal-bright)}
.alert-warn{background:#FFF8E8;border-left:4px solid var(--gold)}
.alert-ok{background:#EDFAF3;border-left:4px solid var(--green)}
.pref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.pref-card{background:var(--card);border-radius:8px;padding:12px 14px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.pref-card:hover{border-color:var(--teal-bright);box-shadow:0 4px 16px rgba(0,196,220,0.15)}
.pref-card.selected{border-color:var(--teal-bright);background:var(--teal-dim)}
.pref-card .pn{font-size:13px;font-weight:700;color:var(--navy)}
.pref-card .ps{font-size:11px;color:var(--text-light);margin-top:2px}
/* CHAT */
.chat-fab{position:fixed;bottom:28px;right:28px;width:54px;height:54px;border-radius:50%;background:var(--navy);border:none;cursor:pointer;box-shadow:0 4px 20px rgba(27,43,94,0.35);display:flex;align-items:center;justify-content:center;z-index:1000;transition:transform .2s}
.chat-fab:hover{transform:scale(1.08)}
.chat-fab svg{width:26px;height:26px;fill:#fff}
.chat-badge{position:absolute;top:-2px;right:-2px;width:14px;height:14px;border-radius:50%;background:var(--orange);border:2px solid #fff;display:none}
.chat-badge.on{display:block}
.chat-panel{position:fixed;bottom:94px;right:28px;width:400px;max-height:620px;background:var(--card);border-radius:16px;box-shadow:var(--shadow-lg);border:1px solid var(--border);display:flex;flex-direction:column;z-index:999;transform:scale(0.92) translateY(12px);opacity:0;pointer-events:none;transition:all .22s cubic-bezier(.4,0,.2,1)}
.chat-panel.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all}
@media(max-width:480px){.chat-panel{width:calc(100vw - 24px);right:12px}}
.chat-header{background:var(--navy);border-radius:16px 16px 0 0;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.chat-header-info{display:flex;align-items:center;gap:10px}
.chat-avatar{width:32px;height:32px;border-radius:50%;background:var(--teal-bright);display:flex;align-items:center;justify-content:center;font-size:15px}
.chat-header-text{color:#fff}
.chat-header-text .ch-name{font-size:14px;font-weight:700}
.chat-header-text .ch-sub{font-size:10px;opacity:.6;margin-top:1px}
.chat-close{background:none;border:none;color:rgba(255,255,255,0.6);cursor:pointer;font-size:20px;line-height:1;padding:2px 6px}
.chat-close:hover{color:#fff}
.chat-area-tag{background:rgba(255,255,255,0.1);border-radius:6px;padding:6px 14px;font-size:11px;color:rgba(255,255,255,0.7);display:flex;align-items:center;gap:6px}
.chat-area-tag span{color:var(--teal-bright);font-weight:700}
.chat-key-row{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--card2);display:flex;gap:8px;align-items:center}
.chat-key-row input{flex:1;border:1.5px solid var(--border-mid);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--text);font-family:'Noto Sans JP',sans-serif}
.chat-key-row input:focus{outline:none;border-color:var(--teal-bright)}
.chat-key-row button{background:var(--teal-bright);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.chat-key-row .key-ok{background:var(--green);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700}
.chat-chips{padding:10px 14px 4px;display:flex;gap:6px;flex-wrap:wrap}
.chat-chip{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(0,168,192,0.3);border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.chat-chip:hover{background:var(--teal-bright);color:#fff}
.chat-messages{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;min-height:200px}
.msg{display:flex;gap:8px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg-bubble{max-width:80%;padding:10px 12px;border-radius:12px;font-size:13px;line-height:1.55}
.msg.ai .msg-bubble{background:var(--surface);color:var(--text);border-radius:4px 12px 12px 12px}
.msg.user .msg-bubble{background:var(--navy);color:#fff;border-radius:12px 4px 12px 12px}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px}
.msg.ai .msg-avatar{background:var(--teal-bright)}
.msg.user .msg-avatar{background:var(--orange)}
.typing-dots{display:flex;gap:4px;padding:8px 12px}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--teal-bright);animation:dot-bounce 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot-bounce{0%,80%,100%{transform:scale(0.8);opacity:.5}40%{transform:scale(1.2);opacity:1}}
.chat-input-row{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input-row textarea{flex:1;border:1.5px solid var(--border-mid);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text);font-family:'Noto Sans JP',sans-serif;resize:none;min-height:38px;max-height:80px}
.chat-input-row textarea:focus{outline:none;border-color:var(--teal-bright)}
.chat-send{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer}
.chat-send:hover{background:var(--navy-mid)}
.chat-send:disabled{opacity:.4;cursor:not-allowed}
</style>
</head>

let currentPref = '福岡県';
let currentCity = '福岡市';
let charts = {};

function getPref(){ return PREF_DATA[currentPref] || PREF_DATA['福岡県']; }

function destroyChart(id){
  if(charts[id]){charts[id].destroy();delete charts[id];}
}

function initSelectors(){
  const sp = document.getElementById('selPref');
  const regions = {};
  Object.keys(PREF_DATA).forEach(p=>{
    const r = PREF_DATA[p].region;
    if(!regions[r]) regions[r]=[];
    regions[r].push(p);
  });
  const rOrder=['北海道','東北','関東','中部','近畿','中国','四国','九州','沖縄'];
  rOrder.forEach(r=>{
    if(!regions[r]) return;
    const og = document.createElement('optgroup');
    og.label = r;
    regions[r].forEach(pref=>{
      const o = document.createElement('option');
      o.value = pref; o.textContent = pref;
      if(pref===currentPref) o.selected=true;
      og.appendChild(o);
    });
    sp.appendChild(og);
  });
  updateCitySelector();
}

function updateCitySelector(){
  const sc = document.getElementById('selCity');
  sc.innerHTML='';
  (CITY_DATA[currentPref]||[]).forEach(c=>{
    const o = document.createElement('option');
    o.value=c; o.textContent=c;
    if(c===currentCity) o.selected=true;
    sc.appendChild(o);
  });
  if(!(CITY_DATA[currentPref]||[]).includes(currentCity))
    currentCity=(CITY_DATA[currentPref]||[])[0]||'';
}

function onPrefChange(){
  currentPref = document.getElementById('selPref').value;
  currentCity = (CITY_DATA[currentPref]||[])[0]||'';
  updateCitySelector();
  renderAll();
}

function onCityChange(){
  currentCity = document.getElementById('selCity').value;
  renderAll();
}

function showTab(i){
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j));
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',i===j));
}

const T='#00A8C0', O='#F07030', R='#D94040', G='#1A9E5A', B='#2878C0', Y='#B8902A';

function axOpts(){
  return {
    x:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{color:'#4A6080',font:{size:10}}},
    y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{color:'#4A6080',font:{size:10}}}
  };
}

function mkLine(id, labels, datasets){
  destroyChart(id);
  const ctx=document.getElementById(id);
  if(!ctx) return;
  charts[id]=new Chart(ctx,{type:'line',data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{font:{size:11},color:'#4A6080'}}},
    scales:axOpts()
  }});
}

function mkBar(id, labels, datasets, stacked){
  destroyChart(id);
  const ctx=document.getElementById(id);
  if(!ctx) return;
  const sc = stacked
    ? {x:{...axOpts().x,stacked:true},y:{...axOpts().y,stacked:true}}
    : axOpts();
  charts[id]=new Chart(ctx,{type:'bar',data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{font:{size:11},color:'#4A6080'}}},
    scales:sc
  }});
}

function mkDoughnut(id, labels, data, colors){
  destroyChart(id);
  const ctx=document.getElementById(id);
  if(!ctx) return;
  charts[id]=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
      plugins:{legend:{position:'right',labels:{font:{size:10},color:'#4A6080',boxWidth:12}}}}});
}

function mkRadar(id, labels, datasets){
  destroyChart(id);
  const ctx=document.getElementById(id);
  if(!ctx) return;
  charts[id]=new Chart(ctx,{type:'radar',data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{font:{size:10},color:'#4A6080'}}},
    scales:{r:{min:0,max:100,ticks:{stepSize:20,font:{size:9},color:'#7A90A8'},
      grid:{color:'rgba(0,0,0,0.08)'},pointLabels:{font:{size:10},color:'#1B2B5E'}}}
  }});
}

// RECOMMENDATION ENGINE (No API)
// =============================================

function calcRecommendScore(d) {
  const market  = Math.min(100, d.custom / 180);
  const share   = Math.min(100, (d.cshare / 58) * 100);
  const growth  = Math.max(0, Math.min(100, 52 + d.growth * 8));
  const income  = Math.min(100, (d.income / 640) * 100);
  const comp    = Math.max(10, 100 - d.comp * 1.5);
  const danchi  = Math.min(100, d.danchi * 1.15);
  return Math.round(market*0.25 + share*0.22 + growth*0.20 + income*0.15 + comp*0.13 + danchi*0.05);
}

function generateReasons(pref, d) {
  const reasons = [];
  const natAvg = 38.2;
  if (d.custom >= 15000)      reasons.push(`年間注文着工 ${d.custom.toLocaleString()}棟と国内有数の大市場`);
  else if (d.custom >= 5000)  reasons.push(`年間注文着工 ${d.custom.toLocaleString()}棟の安定した市場規模`);
  else                        reasons.push(`年間注文着工 ${d.custom.toLocaleString()}棟（小規模だが競合薄い）`);
  const diff = (d.cshare - natAvg).toFixed(1);
  if (d.cshare >= natAvg + 8) reasons.push(`注文住宅シェア ${d.cshare}%（全国比 +${diff}pt）と顧客層が極めて厚い`);
  else if (d.cshare >= natAvg) reasons.push(`注文住宅シェア ${d.cshare}%（全国比 +${diff}pt）と平均超え`);
  else                         reasons.push(`注文住宅シェア ${d.cshare}%（全国比 ${diff}pt）— 市場開拓余地あり`);
  if (d.growth >= 1.5)        reasons.push(`人口 +${d.growth}%成長中で長期需要拡大が確実`);
  else if (d.growth >= 0)     reasons.push(`人口横ばい・安定で底堅い住宅需要`);
  else if (d.growth >= -2)    reasons.push(`緩やかな人口減少だが持ち家率 ${d.danchi}%が高い`);
  else                        reasons.push(`人口減少 ${d.growth}%が課題だが注文シェア高め`);
  if (d.income >= 480)        reasons.push(`平均年収 ${d.income}万円の高収益マーケット`);
  else if (d.income >= 440)   reasons.push(`平均年収 ${d.income}万円と購買力十分`);
  if (d.comp <= 14)           reasons.push(`競合 ${d.comp}社と少なく、先行者利益を取りやすい`);
  else if (d.comp <= 20)      reasons.push(`競合 ${d.comp}社と適度な競争環境`);
  if (d.danchi >= 70)         reasons.push(`持ち家率 ${d.danchi}%（全国トップ水準）の強い持ち家需要`);
  return reasons.slice(0, 4);
}

function getTopRecs(n, regionFilter, sortKey) {
  let entries = Object.entries(PREF_DATA);
  if (regionFilter && regionFilter !== 'all') entries = entries.filter(([,d]) => d.region === regionFilter);
  return entries
    .map(([pref, d]) => ({ pref, d, rscore: calcRecommendScore(d) }))
    .sort((a, b) => {
      if (sortKey === 'growth') return b.d.growth - a.d.growth;
      if (sortKey === 'market') return b.d.custom - a.d.custom;
      if (sortKey === 'share')  return b.d.cshare - a.d.cshare;
      if (sortKey === 'income') return b.d.income - a.d.income;
      return b.rscore - a.rscore;
    })
    .slice(0, n);
}

function genAreaSummary(pref, d) {
  const opp = d.score >= 80 ? '★★★ 優先出店エリア' : d.score >= 65 ? '★★ 有望エリア' : '★ 要検討エリア';
  const rs = calcRecommendScore(d);
  const reasons = generateReasons(pref, d);
  const strategy = d.score >= 80
    ? `積極出店を推奨。ショールーム展開と地域密着マーケティングを優先してください。`
    : d.score >= 65
    ? `有望エリア。競合との差別化ポイント（商品・価格帯・アフター）を明確にして参入検討。`
    : `人口減少傾向あり。高単価商品での収益最大化か、隣接エリアとの面的な戦略を推奨。`;
  return `**${pref}** の商圏評価\n\n${opp}（スコア ${d.score}点 / 推薦スコア ${rs}点）\n\n`
    + `📊 主要データ\n・注文住宅着工: ${d.custom.toLocaleString()}棟（シェア${d.cshare}%）\n`
    + `・人口: ${d.pop}万人（${d.growth>=0?'+':''}${d.growth}%）\n`
    + `・年収: ${d.income}万円　競合: ${d.comp}社　JSK No.1: ${d.top}\n\n`
    + `✅ 推薦理由\n${reasons.map(r=>`・${r}`).join('\n')}\n\n`
    + `💡 戦略方針：${strategy}`;
}

function localChatResponse(input) {
  const q = input.trim();
  const flat = q.replace(/[　\s]/g, '');

  // Prefecture name match (strip 都道府県 suffix for partial match)
  const foundPref = Object.keys(PREF_DATA).find(p => q.includes(p))
    || Object.keys(PREF_DATA).find(p => q.includes(p.replace(/[都道府県]$/,'')));

  const isExpansion = /出店|拡大|進出|展開|どこ|おすすめ|ランキング|どの|どこが|どこに|どの地域|全国/.test(flat);
  const isCompetitor = /競合|ライバル|シェア|ビルダー|JSK|一条|積水|桧家|タマ/.test(flat);
  const isPopulation = /人口|世帯|少子|高齢|増加|減少|成長/.test(flat);
  const isHousing    = /着工|注文住宅|市場|棟数|住宅/.test(flat);
  const isIncome     = /年収|収益|利益|単価|価格帯|費用/.test(flat);
  const isStrategy   = /戦略|作戦|どうすれば|方法|アドバイス|提案|教えて|どうする/.test(flat);
  const isRegion     = /東北|関東|中部|近畿|中国|四国|九州|北海道|沖縄/.test(q);
  const regionMatch  = ['北海道','東北','関東','中部','近畿','中国','四国','九州','沖縄'].find(r => q.includes(r));

  const d = getPref();

  // Specific prefecture asked about
  if (foundPref) return genAreaSummary(foundPref, PREF_DATA[foundPref]);

  // Regional or national expansion recommendation
  if (isExpansion) {
    const tops = getTopRecs(5, regionMatch ? regionMatch : 'all', 'score');
    const label = regionMatch ? `${regionMatch}地方` : '全国';
    let resp = `**${label}出店おすすめランキング TOP${tops.length}**\n\n`;
    tops.forEach((item, i) => {
      const rs = item.rscore;
      const badge = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}位`;
      const reasons = generateReasons(item.pref, item.d);
      resp += `${badge} **${item.pref}**（推薦スコア ${rs}点）\n`;
      resp += reasons.slice(0,3).map(r=>`　・${r}`).join('\n') + '\n\n';
    });
    resp += `現在選択中の ${currentPref} のスコアは ${calcRecommendScore(d)}点 です。`;
    return resp.trim();
  }

  // Competitor
  if (isCompetitor) {
    const top3 = BUILDER_RANKING.slice(0,3);
    return `**${currentPref}の競合分析**\n\n競合社数: ${d.comp}社（推計）\nJSK No.1: **${d.top}**（シェア ${d.tshare}%）\n上位3社合計: 約${(d.tshare*2.4).toFixed(1)}%\n\n`
      + `📊 全国TOP3（${currentPref}補正後）\n`
      + top3.map((b,i)=>`${i+1}位 ${b.name}: ${(b.share*(d.cshare/35)).toFixed(1)}%（${b.trend}）`).join('\n')
      + `\n\n💡 対策\n・${d.top}との商品差別化（価格帯・仕様・アフター）を優先\n`
      + (d.comp<=20 ? '・競合が少ないうちに早期参入でシェア確保' : '・競合が多いため特定ターゲット層への特化戦略が有効');
  }

  // Population
  if (isPopulation) {
    return `**${currentPref}の人口・世帯データ**\n\n総人口: ${d.pop}万人\n5年増減: **${d.growth>=0?'+':''}${d.growth}%**\n世帯数: ${d.hh}万世帯　持ち家率: ${d.danchi}%\n\n`
      + (d.growth >= 1.5 ? '✅ 人口増加基調。長期需要は拡大傾向で出店好機です。'
      : d.growth >= 0   ? '✅ 人口横ばい。安定需要が見込めます。'
      : d.growth >= -2  ? `⚠️ 緩やかな人口減少ですが、持ち家率${d.danchi}%の底堅い需要があります。`
      : `⚠️ 人口減少が続いています。高単価商品での収益確保を優先してください。`);
  }

  // Housing market
  if (isHousing) {
    return `**${currentPref}の住宅市場**\n\n年間総着工: ${d.starts.toLocaleString()}棟\n注文住宅: **${d.custom.toLocaleString()}棟**（シェア ${d.cshare}%）\n全国平均比: ${d.cshare>=38.2?'+':''}${(d.cshare-38.2).toFixed(1)}pt\n\n`
      + (d.cshare>=45 ? '✅ 注文住宅比率が全国平均を大きく上回り、潜在顧客層が厚い優良エリアです。'
      : d.cshare>=38.2 ? '✅ 注文住宅シェアは全国平均以上。安定した需要があります。'
      : '📌 注文住宅シェアはやや低め。分譲・賃貸との差別化訴求が重要です。');
  }

  // Income / pricing
  if (isIncome) {
    return `**${currentPref}の収益性**\n\n平均世帯年収: **${d.income}万円**\n坪単価目安: ${d.land}万円/坪\n建築費目安: ${Math.round(d.income*0.7)}〜${Math.round(d.income*0.9)}万円\n\n`
      + (d.income>=480 ? '💎 高年収エリア。プレミアム・高断熱商品での高単価受注が狙えます。'
      : d.income>=440  ? '✅ 標準以上の年収水準。コスパと品質のバランス訴求が有効です。'
      : '📌 年収水準はやや低め。ローコスト帯での価格競争力を前面に出した展開が有効です。');
  }

  // Default: current area summary
  return genAreaSummary(currentPref, d);
}

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-panel').classList.toggle('open', chatOpen);
  if (chatOpen) {
    updateChatAreaTag();
    renderQuickChips();
    if (chatHistory.length === 0) {
      const d = getPref();
      appendAIMessage(`こんにちは！教えて小村君です 🤖\n\n現在 **${currentPref} ${currentCity}** のデータを参照中。\n\n商圏スコア **${d.score}点**、注文住宅シェア **${d.cshare}%**（全国比 ${(d.cshare-38.2).toFixed(1)}pt）です。\n\nAPIキー不要でオフライン回答します。何でも聞いてください！`);
    }
  }
}

function updateChatAreaTag() {
  const el = document.getElementById('chat-area-label');
  if (el) el.innerHTML = `📍 <span>${currentPref} ${currentCity}</span> <span style="color:var(--green);font-size:10px">● オフライン対応</span>`;
}

function renderQuickChips() {
  const container = document.getElementById('chat-chips');
  if (!container) return;
  container.innerHTML = '';
  const qs = [`${currentPref}の商圏はどう？`, '全国おすすめ出店地は？', '競合対策を教えて', '九州でおすすめは？', '注文シェアが高い県は？'];
  qs.forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'chat-chip';
    btn.textContent = q;
    btn.onclick = () => sendChat(q);
    container.appendChild(btn);
  });
}

function appendAIMessage(text) {
  const box = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="msg-avatar">🤖</div><div class="msg-bubble">${text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function appendUserMessage(text) {
  const box = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="msg-avatar">👤</div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typing-indicator';
  div.innerHTML = `<div class="msg-avatar">🤖</div><div class="msg-bubble" style="padding:6px 12px"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function sendChat(overrideText) {
  const textarea = document.getElementById('chat-input');
  const text = (overrideText || (textarea ? textarea.value.trim() : '')).trim();
  if (!text) return;
  if (textarea && !overrideText) textarea.value = '';
  chatHistory.push(text);
  appendUserMessage(text);
  showTyping();
  // Simulate slight delay for UX feel
  setTimeout(() => {
    hideTyping();
    const reply = localChatResponse(text);
    appendAIMessage(reply);
  }, 420);
}

// Sync chat context on area change
const _origRenderAll = renderAll;
window.renderAll = function() {
  _origRenderAll();
  if (chatOpen) { updateChatAreaTag(); renderQuickChips(); }
};
</script>

<!-- CHAT FAB -->
<button class="chat-fab" onclick="toggleChat()" title="AIに質問する">
  <div class="chat-badge" id="chat-badge"></div>
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
</button>

<!-- CHAT PANEL -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-header">
    <div class="chat-header-info">
      <div class="chat-avatar">🤖</div>
      <div class="chat-header-text">
        <div class="ch-name">教えて小村君 AI</div>
        <div class="ch-sub">API不要・オフライン対応</div>
      </div>
    </div>
    <button class="chat-close" onclick="toggleChat()">×</button>
  </div>
  <div class="chat-area-tag" style="padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);font-size:12px;color:var(--text-mid)">
    <span id="chat-area-label">📍 <span>読込中...</span></span>
  </div>
  <div class="chat-chips" id="chat-chips"></div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-row">
    <textarea id="chat-input" placeholder="例：岐阜で商圏を広げたい／九州おすすめは？／競合対策は？" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"></textarea>
    <button class="chat-send" id="chat-send" onclick="sendChat()">送信</button>
  </div>
</div>

</body>
</html>
